<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="Georgia, 'Times New Roman', serif">
  <!-- For the next editor. APPENDIX figure: the precise vector geometry behind the
       README's tug-of-war cartoon. Goal: show why flipping one pole's pairs makes the
       two gradients reinforce. Two frame gradients (+C and -C) pull one log, the
       adapter axis through zero (base, in weight space). Their shared along-the-axle
       component is v; the up/down parts are equal and opposite so they cancel. The -c
       sign flip makes both frames the same gradient at first order, so they reinforce;
       at C=1 they open to an angle equal to the cos column in the training trace. Do
       NOT feature PCGrad (a minor cleanup that only acts when cos is negative; it
       confused earlier drafts). Style: Tufte minimal, ASCII only no unicode, one
       restrained hue for the learned object, no grid or frame. Render with cairosvg
       and eyeball before shipping. -->
  <defs>
    <marker id="vt" markerWidth="11" markerHeight="11" refX="8" refY="3.5" orient="auto">
      <path d="M0,0 L8,3.5 L0,7 Z" fill="#2a7f7f"/>
    </marker>
    <marker id="bk" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto">
      <path d="M0,0 L6.5,3 L0,6 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <rect width="720" height="440" fill="#ffffff"/>

  <text x="40" y="30" font-size="15.5" fill="#1a1a1a">Two frame gradients pull the log; their common pull rolls it.</text>
  <text x="40" y="50" font-size="12.5" fill="#777">The shared (along-axle) component sums to v; the up/down parts are equal and opposite, so they cancel.</text>

  <!-- the axle / steering direction -->
  <line x1="120" y1="250" x2="560" y2="250" stroke="#bbb" stroke-width="1" stroke-dasharray="2 5"/>
  <line x1="290" y1="250" x2="495" y2="250" stroke="#2a7f7f" stroke-width="4" marker-end="url(#vt)"/>
  <text x="330" y="241" font-size="13" fill="#2a7f7f" font-style="italic">v = common pull</text>

  <!-- the log (axle through 0) -->
  <rect x="232" y="242" width="116" height="16" rx="8" fill="#b08d57" stroke="#8a6d3b" stroke-width="1"/>
  <circle cx="290" cy="250" r="3.5" fill="#1a1a1a"/>
  <text x="290" y="278" font-size="11.5" fill="#555" text-anchor="middle">0 (base)</text>

  <!-- pull g+ (upper) and g- (lower) -->
  <line x1="290" y1="250" x2="448" y2="152" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#bk)"/>
  <text x="372" y="188" font-size="12" fill="#1a1a1a" font-style="italic">g+ (+C)</text>
  <line x1="290" y1="250" x2="448" y2="348" stroke="#1a1a1a" stroke-width="1.8" marker-end="url(#bk)"/>
  <text x="372" y="322" font-size="12" fill="#1a1a1a" font-style="italic">g- (-C)</text>

  <!-- the fighting (perpendicular) components that cancel -->
  <line x1="450" y1="152" x2="450" y2="348" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="4 3"/>

  <!-- stick figure A (upper) -->
  <g stroke="#444" stroke-width="1.6" fill="none">
    <circle cx="470" cy="126" r="7" fill="#fff"/>
    <line x1="470" y1="133" x2="470" y2="156"/>
    <line x1="455" y1="150" x2="470" y2="142"/>
    <line x1="470" y1="142" x2="455" y2="150"/>
    <line x1="470" y1="156" x2="461" y2="174"/>
    <line x1="470" y1="156" x2="481" y2="172"/>
  </g>
  <!-- stick figure B (lower) -->
  <g stroke="#444" stroke-width="1.6" fill="none">
    <circle cx="470" cy="374" r="7" fill="#fff"/>
    <line x1="470" y1="367" x2="470" y2="344"/>
    <line x1="455" y1="350" x2="470" y2="358"/>
    <line x1="470" y1="344" x2="461" y2="326"/>
    <line x1="470" y1="344" x2="481" y2="328"/>
  </g>

  <!-- tie to trace -->
  <text x="40" y="410" font-size="12" fill="#555">Angle between the pulls = the trace 'cos' column (0.48 -&gt; 0 as the adapter grows at C=1).</text>
</svg>
