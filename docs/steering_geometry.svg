<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" font-family="'Coming Soon','Comic Neue','Comic Sans MS',cursive">
  <!-- For the next editor. APPENDIX figure (advanced): the gradient geometry behind
       the README cartoon, in the same xkcd style as the body figure. Each puller's
       arm is drawn COLLINEAR with its gradient rope so the angles match. Message:
       the two training gradients g+(+c) and g-(-c) pull the axle (the steering
       direction, base at 0). Their shared along-axle part adds up to v; their up/down
       parts are equal and opposite, so they cancel. The -c sign flip is what points
       both the same way along the axle. Do NOT feature PCGrad. Keep ASCII only. Font
       'Coming Soon' (installed). Render with cairosvg and eyeball before shipping. -->
  <defs>
    <marker id="vt" markerUnits="userSpaceOnUse" markerWidth="15" markerHeight="13" refX="10" refY="5.5" orient="auto">
      <path d="M0,0 L12,5.5 L0,11 Z" fill="#2a7f7f"/>
    </marker>
    <marker id="bk" markerUnits="userSpaceOnUse" markerWidth="13" markerHeight="11" refX="9" refY="5" orient="auto">
      <path d="M0,0 L11,5 L0,10 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <text x="360" y="34" text-anchor="middle" font-size="19" fill="#1a1a1a">why flipping one rope makes both pulls reinforce</text>
  <text x="360" y="56" text-anchor="middle" font-size="13" fill="#777">the shared along-axle part adds up to v; the up/down parts are equal and opposite, so they cancel</text>

  <!-- the axle / steering direction -->
  <line x1="120" y1="250" x2="560" y2="250" stroke="#bbb" stroke-width="1.5" stroke-dasharray="2 6"/>

  <!-- v = common pull, along the axle -->
  <line x1="290" y1="250" x2="500" y2="250" stroke="#2a7f7f" stroke-width="5" marker-end="url(#vt)"/>
  <text x="372" y="240" text-anchor="middle" font-size="14" fill="#2a7f7f">v = common pull</text>

  <!-- the log at base (0) -->
  <rect x="232" y="242" width="116" height="16" rx="8" fill="#c9a86a" stroke="#7d6433" stroke-width="1.5"/>
  <circle cx="290" cy="250" r="3.5" fill="#1a1a1a"/>
  <text x="290" y="280" font-size="13" fill="#555" text-anchor="middle">0 (base)</text>

  <!-- g+ rope (up-right) and g- rope (down-right) -->
  <line x1="290" y1="250" x2="455" y2="150" stroke="#1a1a1a" stroke-width="2" marker-end="url(#bk)"/>
  <text x="356" y="186" font-size="14" fill="#1a1a1a">g+ (+c)</text>
  <line x1="290" y1="250" x2="455" y2="350" stroke="#1a1a1a" stroke-width="2" marker-end="url(#bk)"/>
  <text x="356" y="326" font-size="14" fill="#1a1a1a">g- (-c)</text>

  <!-- the up/down components that cancel -->
  <line x1="455" y1="150" x2="455" y2="350" stroke="#c0392b" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="520" y="254" text-anchor="middle" font-size="12" fill="#c0392b">up/down</text>
  <text x="520" y="270" text-anchor="middle" font-size="12" fill="#c0392b">cancel</text>

  <!-- puller A: grips the g+ arrowhead, arm collinear with the g+ rope, leans up-right -->
  <circle cx="490" cy="126" r="10" fill="none" stroke="#222" stroke-width="2.2"/>
  <path d="M476,138 L455,150" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M476,138 L470,165" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M483,134 L476,138" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M470,165 L452,188 M470,165 L478,191" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- puller B: mirror of A about the axle, grips the g- arrowhead, arm collinear with g- -->
  <circle cx="490" cy="374" r="10" fill="none" stroke="#222" stroke-width="2.2"/>
  <path d="M476,362 L455,350" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M476,362 L470,335" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M483,366 L476,362" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>
  <path d="M470,335 L452,312 M470,335 L478,309" stroke="#222" stroke-width="2.2" fill="none" stroke-linecap="round"/>

  <!-- caption -->
  <text x="360" y="416" text-anchor="middle" font-size="13" fill="#444">the -c flip points both gradients the same way along the axle, so they add (v); the sideways parts cancel.</text>
</svg>
